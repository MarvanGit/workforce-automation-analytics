<div class="app-shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">WA</div>
      <div>
        <h1 class="brand-title">Workforce Analytics</h1>
        <p class="brand-subtitle">Scheduling operations</p>
      </div>
    </div>

    <div class="topbar-status">
      <span class="status-dot" aria-hidden="true"></span>
      <span>Local</span>
    </div>
  </header>

  <aside class="sidebar">
    <nav class="nav-group" aria-label="Primary navigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        Dashboard
      </a>
      <a routerLink="/imports" routerLinkActive="active" class="nav-link">Imports</a>
      <a routerLink="/availability" routerLinkActive="active" class="nav-link">Availability</a>
      <a routerLink="/scheduling" routerLinkActive="active" class="nav-link">Scheduling</a>
      <a routerLink="/analytics" routerLinkActive="active" class="nav-link">Analytics</a>
    </nav>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
